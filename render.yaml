services:
  - type: web
    name: matrimony-backend
    env: node
    region: oregon
    plan: free

    # Build and start configuration
    buildCommand: npm install
    startCommand: npm start

    # Root directory
    rootDir: ./

    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        scope: runtime
      - key: MONGO_URI
        sync: false # Must be set manually in Render dashboard
      - key: CLIENT_ORIGIN
        sync: false # Set to your Flutter web app URL

    # Auto-deploy on git push
    autoDeploy: true

    # Health check (optional)
    healthCheckPath: /matrimony/api

    # Concurrency (free tier is single instance)
    numInstances: 1
